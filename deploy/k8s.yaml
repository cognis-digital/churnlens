apiVersion: apps/v1
kind: Deployment
metadata: { name: churnlens, labels: { app: churnlens } }
spec:
  replicas: 1
  selector: { matchLabels: { app: churnlens } }
  template:
    metadata: { labels: { app: churnlens } }
    spec:
      containers:
        - name: churnlens
          image: ghcr.io/cognis-digital/churnlens:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: churnlens }
spec:
  selector: { app: churnlens }
  ports: [{ port: 80, targetPort: 8000 }]
